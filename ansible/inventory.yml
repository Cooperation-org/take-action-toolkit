---
# Inventory for Take Action Toolkit deployment
#
# Update domain and admin email before running the playbook.
# For the admin password, use ansible-vault:
#   ansible-vault encrypt_string 'your-password' --name 'vault_wp_admin_password'

all:
  hosts:
    takeaction:
      ansible_host: "149.51.16.39"
      ansible_port: 2513
      ansible_user: "kene"
      ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
      ansible_python_interpreter: /usr/bin/python3

      # Site configuration
      domain: "takeaction.example.org"  # <-- Replace with real domain once confirmed
      wp_admin_email: "admin@example.org"  # <-- Replace with real admin email

      # Secrets — use ansible-vault in production
      # vault_wp_admin_password: "..."
